<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo oscuro -->
  <rect width="1200" height="630" fill="#0F1B2D"/>

  <!-- Textura sutil: grilla de puntos -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1A2B40"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Barra superior: colores de los 4 barrios -->
  <rect x="0"   y="0" width="300" height="7" fill="#1C5BA8"/>
  <rect x="300" y="0" width="300" height="7" fill="#C2185B"/>
  <rect x="600" y="0" width="300" height="7" fill="#B71C1C"/>
  <rect x="900" y="0" width="300" height="7" fill="#555555"/>

  <!-- ── Área de texto (izquierda) ───────────────────── -->

  <!-- Etiqueta superior -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="400"
        fill="#89C9DD" letter-spacing="3">PERIODISMO TERRITORIAL · CABA</text>

  <!-- Título principal -->
  <text x="75" y="255" font-family="Arial Black, Arial, sans-serif" font-size="108" font-weight="900"
        fill="white">Comuna 4.0</text>

  <!-- Subtítulo -->
  <text x="80" y="308" font-family="Arial, sans-serif" font-size="34" font-weight="300"
        fill="#89AFCC">Mapa Vecinal de la Comuna 4</text>

  <!-- Separador -->
  <line x1="80" y1="345" x2="640" y2="345" stroke="#1E3555" stroke-width="1.5"/>

  <!-- Descripción -->
  <text x="80" y="392" font-family="Arial, sans-serif" font-size="25" fill="#6A8AAA">
    Recorremos las plazas de La Boca, Barracas,
  </text>
  <text x="80" y="425" font-family="Arial, sans-serif" font-size="25" fill="#6A8AAA">
    Parque Patricios y Nueva Pompeya.
  </text>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="25" fill="#6A8AAA">
    Escuchamos a los vecinos.
  </text>

  <!-- Chips de barrios — dos filas -->
  <!-- Fila 1 -->
  <rect x="80"  y="500" width="148" height="38" rx="19" fill="#1C5BA8" opacity="0.9"/>
  <text x="154" y="524" font-family="Arial, sans-serif" font-size="17" fill="white"
        text-anchor="middle" font-weight="600">La Boca</text>

  <rect x="240" y="500" width="148" height="38" rx="19" fill="#C2185B" opacity="0.9"/>
  <text x="314" y="524" font-family="Arial, sans-serif" font-size="17" fill="white"
        text-anchor="middle" font-weight="600">Barracas</text>

  <!-- Fila 2 -->
  <rect x="80"  y="548" width="210" height="38" rx="19" fill="#B71C1C" opacity="0.9"/>
  <text x="185" y="572" font-family="Arial, sans-serif" font-size="17" fill="white"
        text-anchor="middle" font-weight="600">Parque Patricios</text>

  <rect x="302" y="548" width="202" height="38" rx="19" fill="#444444" opacity="0.9"/>
  <text x="403" y="572" font-family="Arial, sans-serif" font-size="17" fill="white"
        text-anchor="middle" font-weight="600">Nueva Pompeya</text>

  <!-- URL -->
  <text x="640" y="612" font-family="Arial, sans-serif" font-size="18" fill="#2E4A68"
        text-anchor="end">comuna-4-0.vercel.app</text>

  <!-- ── Mapa SVG (derecha) ─────────────────────────── -->
  <!-- Escala 0.86, offset (700, 100) -->
  <!-- Riachuelo -->
  <path d="M 700,451 Q 780,440 870,456 Q 970,466 1097,444 L 1109,454 L 1109,475 L 700,475 Z"
        fill="#89C9DD" opacity="0.25"/>
  <text x="950" y="472" font-family="Arial, sans-serif" font-size="11" fill="#89C9DD"
        opacity="0.5" text-anchor="middle">Riachuelo</text>

  <!-- Parque Patricios (norte) -->
  <polygon points="743,130 1104,130 1104,268 743,268"
           fill="#B71C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" opacity="0.82"/>

  <!-- La Boca (sureste) -->
  <polygon points="975,268 1104,268 1109,440 1008,457 950,375"
           fill="#1C5BA8" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" opacity="0.82"/>

  <!-- Barracas (centro-sur) -->
  <polygon points="820,268 975,268 950,375 1008,457 907,462 820,449"
           fill="#C2185B" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" opacity="0.82"/>

  <!-- Nueva Pompeya (suroeste) -->
  <polygon points="743,268 820,268 820,449 743,461"
           fill="#555555" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" opacity="0.82"/>

  <!-- Etiquetas del mapa -->
  <text x="924" y="204" font-family="Arial, sans-serif" font-size="15" fill="white"
        text-anchor="middle" font-weight="700" opacity="0.85">Parque Patricios</text>

  <text x="1048" y="360" font-family="Arial, sans-serif" font-size="13" fill="white"
        text-anchor="middle" font-weight="700" opacity="0.85">La Boca</text>

  <text x="910" y="378" font-family="Arial, sans-serif" font-size="13" fill="white"
        text-anchor="middle" font-weight="700" opacity="0.85">Barracas</text>

  <text x="781"  y="356" font-family="Arial, sans-serif" font-size="12" fill="white"
        text-anchor="middle" font-weight="700" opacity="0.85">Nueva</text>
  <text x="781" y="373" font-family="Arial, sans-serif" font-size="12" fill="white"
        text-anchor="middle" font-weight="700" opacity="0.85">Pompeya</text>

  <!-- Marco sutil del mapa -->
  <rect x="700" y="100" width="460" height="400" fill="none"
        stroke="#1E3555" stroke-width="1" rx="4"/>
</svg>
